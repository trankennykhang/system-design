version: '3.8'

services:
  # LAYER 1: The Rate Limiter (NGINX Proxy)
  rate-limiter:
    image: nginx:alpine
    container_name: local_nginx_ratelimiter
    ports:
      - "8011:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-service
    networks:
      - architecture_net
  # LAYER 2: Load Balancer (Simulated by NGINX Proxy)

  # LAYER 3: The Multiple Servers Backend (Simulated by container scaling)
  backend-service:
    image: node:18-alpine
    container_name: local_backend_app
    working_dir: /usr/src/app
    command: sh -c "npm install express && node server.js"
    volumes:
      - ./backend:/usr/src/app
    networks:
      - architecture_net

  laravel-service:
    # This is a basic setup for a Laravel service, suitable for development.
    # For production, a more robust setup with a dedicated web server (like Nginx)
    # and PHP-FPM is recommended, often built into a custom Docker image.
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: local_laravel_app
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html # Assumes a 'laravel' directory with your app source
    networks:
      - architecture_net

  # TESTING RUNNER: Pre-loaded tool container inside the network to bypass host OS limits
  performance-tester:
    image: alpine:latest
    container_name: local_bombardier_tester
    entrypoint: ["sh", "-c", "apk add --no-cache curl && wget https://github.com/codesenberg/bombardier/releases/download/v1.2.6/bombardier-linux-amd64 -O /usr/local/bin/bombardier && chmod +x /usr/local/bin/bombardier && tail -f /dev/null"]
    depends_on:
      - rate-limiter
    networks:
      - architecture_net

networks:
  architecture_net:
    driver: bridge
